<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To - Do List</title>
</head>
<style>
 body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #74ebd5, #9face6);
  text-align: center;
  margin: 0;
  padding: 20px;
  transition: 0.4s;
}

marquee {
  font-size: 32px;
  font-weight: bold;
  color: white;
  margin-bottom: 20px;
}

input[type="text"] {
  padding: 12px;
  width: 280px;
  border: none;
  border-radius: 8px;
  outline: none;
  margin: 5px;
  font-size: 15px;
  transition: 0.3s;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.25s;
  box-shadow: 0 3px 8px rgba(0,0,0,0.15);
}

button:hover {
  transform: translateY(-3px);
}

#add {
  background-color: #28a745;
  color: white;
}

#del {
  background-color: #dc3545;
  color: white;
}

#emp {
  background-color: #ffc107;
  color: black;
}

#dark {
  background-color: #343a40;
  color: white;
}

ul {
  margin-top: 20px;
  padding: 0;
}

li {
  transition: 0.8s;
  list-style: none;
  background: white;
  margin: 10px auto;
  padding: 12px;
  width: 350px;
  border-radius: 10px;
  text-align: left;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.active {
  background-color: #90e0a3;
  text-decoration: line-through;
  font-style: italic;
  opacity: 0.8;
  transform: scale(0.95);
}

.fade-out {
  transform: translateX(-100px);
  opacity: 0;
}

p {
  color: red;
  font-weight: bold;
}

/* DARK MODE */



.dark-mode {
  background: linear-gradient(135deg, #1e1e1e, #353535);
  color: white;
}

.dark-mode li {
  background: #444;
  color: white;
}

.dark-mode input[type="text"] {
  background: #555;
  color: white;
}

.dark-mode .active {
  background: #2d6a4f;
}

.dark-mode #message {
  color: #ff7b7b;
}
</style>

<body>
  <marquee scrollamount="20">To Do List</marquee>

  <input type="text" id="inputbar">
  <button id="add">Add Task</button>
  <button id="del">Delete Task</button>
  <button id="emp">Empty Task</button>
  <button id="dark">🌙 Dark Mode</button>

  <ul id="phrase">

  </ul>
  <p id="message"></p>

  <script>
    let input = document.getElementById("inputbar")
    let adding = document.getElementById("add")
    let remove = document.getElementById("del")
    let empty = document.getElementById("emp")
    let mes = document.getElementById("message")

    input.addEventListener("keydown", function(e){
      if(e.key === "Enter"){
        adding.click()
      }
    })

    adding.addEventListener("click", function () {
      let value = input.value.trim()
      if (value === ""){
        mes.innerText = "❌Input cannot be empty"
      }
      else if(value.length < 5){
        mes.innerText = "❌Minimum 5 characters required"
      }
      else if(value.length > 25){
        mes.innerText = "❌Maximum 25 characters required"
      }
      else {
        let item = document.createElement("li")
        let check = document.createElement("input")
        let now = new Date().toLocaleTimeString();
        check.type = "checkbox"
        item.appendChild(check)
        item.appendChild(document.createTextNode("" + input.value + "    ______   "  + now));
        document.getElementById("phrase").appendChild(item)
        input.value = ""
        mes.innerText = ""
        check.addEventListener("change", function () {
          if (check.checked) {
            item.classList.add("active")
          } else {
            item.classList.remove("active")
          }
        })
      }
    })
    remove.addEventListener("click", function () {
  let list = document.getElementById("phrase");
  let items = list.querySelectorAll("li");

  let found = false;

  items.forEach(function (item) {
    let check = item.querySelector("input[type='checkbox']");

    if (check && check.checked) {
       item.classList.add("fade-out");
        setTimeout(() => {
    item.remove();
  }, 500);
      found = true;
    }
  });

  if (!found) {
    alert("No checked task found to delete");
  }
});
    empty.addEventListener("click", function () {
      let list = document.getElementById("phrase")
      if (list.children.length > 0) {
        if(confirm("Do You Really Want To Delete All Tasks!")){
          list.innerHTML = ""
          alert("All Task have been removed Sucessfully")
        }
      }
      else {
        alert("Already Empty")
      }

    })
    let dark = document.getElementById("dark")

// load saved theme
if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark-mode")
  dark.innerText = "☀️ Light Mode"
}

// toggle theme
dark.addEventListener("click", function () {
  document.body.classList.toggle("dark-mode")

  if (document.body.classList.contains("dark-mode")) {
    dark.innerText = "☀️ Light Mode"
    localStorage.setItem("theme", "dark")
  } else {
    dark.innerText = "🌙 Dark Mode"
    localStorage.setItem("theme", "light")
  }
})
  </script>
</body>

</html>
